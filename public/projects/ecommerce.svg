<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff8c00" />
      <stop offset="100%" stop-color="#ff5500" />
    </linearGradient>

    <!-- Blue Accent -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <!-- Card Background -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#111827" stop-opacity="0.9" />
    </linearGradient>

    <!-- Grid lines pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Base Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect width="800" height="600" fill="url(#grid)" />

  <!-- Decorative Light Glow in center -->
  <circle cx="400" cy="300" r="250" fill="#ff6b00" opacity="0.06" filter="blur(80px)" />

  <!-- E-commerce Dashboard Mockup Outer Frame -->
  <rect x="60" y="50" width="680" height="500" rx="16" fill="#1e293b" stroke="#334155" stroke-width="4" />
  
  <!-- Browser Header/Bar -->
  <rect x="60" y="50" width="680" height="40" rx="16" fill="#0f172a" />
  <!-- Window buttons -->
  <circle cx="90" cy="70" r="6" fill="#ef4444" />
  <circle cx="110" cy="70" r="6" fill="#f59e0b" />
  <circle cx="130" cy="70" r="6" fill="#10b981" />
  <!-- Browser URL bar -->
  <rect x="180" y="58" width="440" height="24" rx="6" fill="#1e293b" />
  <text x="200" y="74" fill="#64748b" font-family="sans-serif" font-size="12">admin-shop.priyanshu.dev/dashboard</text>

  <!-- Main Canvas Area -->
  <g transform="translate(60, 90)">
    <!-- Sidebar -->
    <rect x="0" y="0" width="160" height="460" fill="#0f172a" opacity="0.9" />
    <!-- Sidebar items placeholder -->
    <rect x="20" y="30" width="120" height="20" rx="4" fill="url(#accentGrad)" />
    <rect x="20" y="70" width="100" height="12" rx="4" fill="#334155" />
    <rect x="20" y="100" width="110" height="12" rx="4" fill="#334155" />
    <rect x="20" y="130" width="90" height="12" rx="4" fill="#334155" />
    <rect x="20" y="160" width="100" height="12" rx="4" fill="#334155" />
    
    <!-- Top Stats Row (3 cards) -->
    <!-- Card 1: Sales -->
    <rect x="180" y="20" width="160" height="90" rx="8" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5" />
    <text x="195" y="45" fill="#94a3b8" font-family="sans-serif" font-size="12" font-weight="bold">TOTAL REVENUE</text>
    <text x="195" y="75" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">$45,231.89</text>
    <path d="M 300 70 L 320 50 L 330 60" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" />

    <!-- Card 2: Orders -->
    <rect x="360" y="20" width="160" height="90" rx="8" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5" />
    <text x="375" y="45" fill="#94a3b8" font-family="sans-serif" font-size="12" font-weight="bold">ACTIVE SESSIONS</text>
    <text x="375" y="75" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="bold">+2,350</text>

    <!-- Card 3: Products -->
    <rect x="540" y="20" width="120" height="90" rx="8" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5" />
    <text x="555" y="45" fill="#94a3b8" font-family="sans-serif" font-size="12" font-weight="bold">PRODUCTS</text>
    <text x="555" y="75" fill="#ff6b00" font-family="sans-serif" font-size="22" font-weight="bold">428</text>

    <!-- Main Chart Area -->
    <rect x="180" y="130" width="480" height="180" rx="8" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5" />
    <text x="200" y="160" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold">Sales Overview</text>
    <!-- Chart Grid Lines -->
    <line x1="200" y1="180" x2="630" y2="180" stroke="#1f2937" stroke-width="1" />
    <line x1="200" y1="210" x2="630" y2="210" stroke="#1f2937" stroke-width="1" />
    <line x1="200" y1="240" x2="630" y2="240" stroke="#1f2937" stroke-width="1" />
    <line x1="200" y1="270" x2="630" y2="270" stroke="#1f2937" stroke-width="1" />
    
    <!-- Chart Lines / Areas -->
    <!-- Orange Line (Sales) -->
    <path d="M 200 260 Q 240 200 280 230 T 360 170 T 440 220 T 520 160 T 600 150 L 630 145" fill="none" stroke="url(#accentGrad)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Blue Line (Traffic) -->
    <path d="M 200 240 Q 240 220 280 250 T 360 210 T 440 240 T 520 190 T 600 210 L 630 185" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="4 4" stroke-linecap="round" />

    <!-- Bottom Left: Recent Orders List -->
    <rect x="180" y="330" width="280" height="110" rx="8" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5" />
    <text x="195" y="355" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold">RECENT TRANSACTIONS</text>
    <!-- Item 1 -->
    <circle cx="205" cy="380" r="10" fill="#ff6b00" fill-opacity="0.2" />
    <circle cx="205" cy="380" r="4" fill="#ff6b00" />
    <rect x="225" y="375" width="80" height="10" rx="2" fill="#475569" />
    <rect x="390" y="375" width="50" height="10" rx="2" fill="#10b981" />
    <!-- Item 2 -->
    <circle cx="205" cy="410" r="10" fill="#3b82f6" fill-opacity="0.2" />
    <circle cx="205" cy="410" r="4" fill="#3b82f6" />
    <rect x="225" y="405" width="100" height="10" rx="2" fill="#475569" />
    <rect x="390" y="405" width="50" height="10" rx="2" fill="#10b981" />

    <!-- Bottom Right: Dynamic Donut Chart -->
    <rect x="480" y="330" width="180" height="110" rx="8" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5" />
    <circle cx="540" cy="385" r="30" fill="none" stroke="#1f2937" stroke-width="10" />
    <circle cx="540" cy="385" r="30" fill="none" stroke="#ff6b00" stroke-width="10" stroke-dasharray="140 200" stroke-dashoffset="30" />
    <circle cx="540" cy="385" r="30" fill="none" stroke="#3b82f6" stroke-width="10" stroke-dasharray="45 200" stroke-dashoffset="170" />
    
    <!-- Legend -->
    <rect x="590" y="360" width="8" height="8" rx="2" fill="#ff6b00" />
    <rect x="605" y="366" width="30" height="6" rx="2" fill="#94a3b8" />
    <rect x="590" y="375" width="8" height="8" rx="2" fill="#3b82f6" />
    <rect x="605" y="381" width="40" height="6" rx="2" fill="#94a3b8" />
    <rect x="590" y="390" width="8" height="8" rx="2" fill="#1f2937" />
    <rect x="605" y="396" width="25" height="6" rx="2" fill="#94a3b8" />
  </g>
</svg>
