<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#180b2c" />
    </linearGradient>

    <!-- Colors for Boards -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1a3a" />
      <stop offset="100%" stop-color="#0f0b1e" />
    </linearGradient>

    <!-- Creative Neon Gradients -->
    <linearGradient id="accentPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <!-- Grid lines pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#251b3d" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Base Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect width="800" height="600" fill="url(#grid)" />

  <!-- Accent Glow -->
  <circle cx="200" cy="400" r="240" fill="#ec4899" opacity="0.04" filter="blur(90px)" />
  <circle cx="600" cy="200" r="240" fill="#8b5cf6" opacity="0.06" filter="blur(90px)" />

  <!-- App Window Container -->
  <rect x="60" y="50" width="680" height="500" rx="16" fill="#0c0a1c" stroke="#2a1b4e" stroke-width="4" />
  
  <!-- Browser Header/Bar -->
  <rect x="60" y="50" width="680" height="40" rx="16" fill="#05030f" />
  <!-- Window buttons -->
  <circle cx="90" cy="70" r="6" fill="#ef4444" />
  <circle cx="110" cy="70" r="6" fill="#f59e0b" />
  <circle cx="130" cy="70" r="6" fill="#10b981" />
  <!-- URL Bar -->
  <rect x="180" y="58" width="440" height="24" rx="6" fill="#1b1235" />
  <text x="200" y="74" fill="#8c77b5" font-family="sans-serif" font-size="12">creative-fusion.priyanshu.dev/editor</text>

  <!-- Content Canvas Area -->
  <g transform="translate(60, 90)">
    <!-- Sidebar / Toolbar -->
    <rect x="0" y="0" width="70" height="460" fill="#060410" opacity="0.9" stroke="#1f123c" stroke-width="1" />
    <!-- Toolbar icons representation -->
    <rect x="20" y="30" width="30" height="30" rx="6" fill="url(#accentPink)" />
    <!-- Mini icons -->
    <rect x="25" y="85" width="20" height="20" rx="4" fill="#1f123c" />
    <rect x="25" y="125" width="20" height="20" rx="4" fill="#1f123c" />
    <rect x="25" y="165" width="20" height="20" rx="4" fill="#1f123c" />
    <rect x="25" y="205" width="20" height="20" rx="4" fill="#1f123c" />
    <circle cx="35" cy="410" r="14" fill="#3b82f6" />

    <!-- Left Design Sidebar -->
    <rect x="70" y="0" width="180" height="460" fill="#0b0821" stroke="#1f123c" stroke-width="1" />
    <text x="90" y="30" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold">LAYERS</text>
    <rect x="90" y="50" width="140" height="22" rx="4" fill="#1a1135" />
    <rect x="100" y="58" width="80" height="6" rx="1.5" fill="#ec4899" />
    <!-- Dynamic layer tree list -->
    <rect x="90" y="85" width="140" height="22" rx="4" fill="#0d0a27" />
    <rect x="110" y="93" width="70" height="6" rx="1.5" fill="#8b5cf6" opacity="0.8" />
    <rect x="90" y="115" width="140" height="22" rx="4" fill="#0d0a27" />
    <rect x="110" y="123" width="90" height="6" rx="1.5" fill="#8b5cf6" opacity="0.8" />
    <rect x="90" y="145" width="140" height="22" rx="4" fill="#0d0a27" />
    <rect x="110" y="153" width="60" height="6" rx="1.5" fill="#8b5cf6" opacity="0.8" />

    <text x="90" y="210" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="bold">PALETTE</text>
    <!-- Color palette dots -->
    <circle cx="102" cy="240" r="12" fill="#ec4899" />
    <circle cx="134" cy="240" r="12" fill="#8b5cf6" />
    <circle cx="166" cy="240" r="12" fill="#3b82f6" />
    <circle cx="198" cy="240" r="12" fill="#10b981" />
    <circle cx="102" cy="270" r="12" fill="#f59e0b" />
    <circle cx="134" cy="270" r="12" fill="#ffffff" />
    <circle cx="166" cy="270" r="12" fill="#1e293b" />

    <!-- Main Canvas Viewport -->
    <rect x="270" y="20" width="390" height="420" rx="8" fill="#130f2e" stroke="#2a1b4e" stroke-width="1.5" />
    <!-- Dynamic Grid in Canvas -->
    <path d="M 270 120 L 660 120 M 270 220 L 660 220 M 270 320 L 660 320" fill="none" stroke="#1c1642" stroke-width="1" />
    
    <!-- Artboard Layout design representation -->
    <rect x="300" y="60" width="330" height="120" rx="8" fill="url(#panelGrad)" stroke="#3a256a" stroke-width="1" />
    <!-- Glowing vector curve inside artboard -->
    <path d="M 330 140 C 370 70, 420 160, 480 90 Q 530 150, 600 110" fill="none" stroke="url(#accentPink)" stroke-width="3" stroke-linecap="round" />
    <!-- Vector nodes (dots) on curve -->
    <circle cx="330" cy="140" r="4" fill="#ffffff" stroke="#ec4899" stroke-width="2" />
    <circle cx="480" cy="90" r="4" fill="#ffffff" stroke="#ec4899" stroke-width="2" />
    <circle cx="600" cy="110" r="4" fill="#ffffff" stroke="#ec4899" stroke-width="2" />

    <!-- Text styling details inside Canvas -->
    <text x="300" y="240" fill="#ffffff" font-family="sans-serif" font-size="20" font-weight="black">Creative Fusion</text>
    <text x="300" y="265" fill="#8c77b5" font-family="sans-serif" font-size="11">Where code meets artistic pixel precision</text>
    
    <!-- Card inside Canvas -->
    <rect x="300" y="300" width="150" height="110" rx="8" fill="#1a123a" />
    <rect x="320" y="320" width="30" height="30" rx="15" fill="#8b5cf6" />
    <rect x="320" y="365" width="110" height="8" rx="2" fill="#8c77b5" />
    <rect x="320" y="380" width="80" height="8" rx="2" fill="#8c77b5" opacity="0.5" />

    <rect x="470" y="300" width="160" height="110" rx="8" fill="#1a123a" />
    <circle cx="550" cy="355" r="25" fill="none" stroke="#ec4899" stroke-width="4" />
    <path d="M 540 355 L 548 363 L 563 348" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" />
  </g>
</svg>
