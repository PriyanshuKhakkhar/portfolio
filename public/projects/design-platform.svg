<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#071224" />
    </linearGradient>

    <!-- Colors for Boards -->
    <linearGradient id="widgetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Grid lines pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#131e33" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Base Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect width="800" height="600" fill="url(#grid)" />

  <!-- Accent Glow -->
  <circle cx="500" cy="350" r="230" fill="#3b82f6" opacity="0.05" filter="blur(80px)" />
  <circle cx="300" cy="150" r="180" fill="#ff6b00" opacity="0.04" filter="blur(80px)" />

  <!-- App Window Container -->
  <rect x="60" y="50" width="680" height="500" rx="16" fill="#0c101d" stroke="#1f293d" stroke-width="4" />
  
  <!-- Browser Header/Bar -->
  <rect x="60" y="50" width="680" height="40" rx="16" fill="#040711" />
  <!-- Window buttons -->
  <circle cx="90" cy="70" r="6" fill="#ef4444" />
  <circle cx="110" cy="70" r="6" fill="#f59e0b" />
  <circle cx="130" cy="70" r="6" fill="#10b981" />
  <!-- URL Bar -->
  <rect x="180" y="58" width="440" height="24" rx="6" fill="#141c2f" />
  <text x="200" y="74" fill="#526488" font-family="sans-serif" font-size="12">ui-designer.priyanshu.dev/editor</text>

  <!-- Content Canvas Area -->
  <g transform="translate(60, 90)">
    <!-- Right sidebar (Properties Inspector) -->
    <rect x="520" y="0" width="160" height="460" fill="#060913" opacity="0.9" stroke="#172237" stroke-width="1" />
    <text x="540" y="30" fill="#94a3b8" font-family="sans-serif" font-size="11" font-weight="bold">PROPERTIES</text>
    
    <!-- Property controls placeholder -->
    <rect x="540" y="50" width="120" height="24" rx="4" fill="#1e293b" />
    <rect x="550" y="59" width="60" height="6" rx="1.5" fill="#94a3b8" />
    <circle cx="644" cy="62" r="5" fill="#3b82f6" />

    <rect x="540" y="85" width="120" height="24" rx="4" fill="#1e293b" />
    <rect x="550" y="94" width="75" height="6" rx="1.5" fill="#94a3b8" />

    <text x="540" y="140" fill="#94a3b8" font-family="sans-serif" font-size="11" font-weight="bold">ALIGNMENT</text>
    <!-- Alignment icons block -->
    <rect x="540" y="155" width="25" height="25" rx="4" fill="#1e293b" />
    <rect x="572" y="155" width="25" height="25" rx="4" fill="#3b82f6" />
    <rect x="604" y="155" width="25" height="25" rx="4" fill="#1e293b" />
    <rect x="636" y="155" width="24" height="25" rx="4" fill="#1e293b" />

    <text x="540" y="210" fill="#94a3b8" font-family="sans-serif" font-size="11" font-weight="bold">LAYOUT</text>
    <!-- Slider -->
    <line x1="540" y1="235" x2="660" y2="235" stroke="#1f2937" stroke-width="4" stroke-linecap="round" />
    <line x1="540" y1="235" x2="610" y2="235" stroke="#ff6b00" stroke-width="4" stroke-linecap="round" />
    <circle cx="610" cy="235" r="6" fill="#ffffff" stroke="#ff6b00" stroke-width="2" />

    <!-- Center Canvas Workspace -->
    <!-- Grid inside workspace -->
    <rect x="20" y="20" width="480" height="420" rx="8" fill="#0a0d18" stroke="#1e293b" stroke-width="1.5" />
    <!-- Diagonal lines representing layout wireframe -->
    <line x1="20" y1="20" x2="500" y2="440" stroke="#131a2c" stroke-width="1.5" />
    <line x1="500" y1="20" x2="20" y2="440" stroke="#131a2c" stroke-width="1.5" />
    
    <!-- Responsive layout frames -->
    <!-- Mobile Frame wireframe -->
    <rect x="60" y="80" width="130" height="260" rx="12" fill="url(#widgetGrad)" stroke="#3b82f6" stroke-width="2" />
    <!-- Dynamic interface indicators -->
    <rect x="80" y="110" width="90" height="15" rx="3" fill="#334155" />
    <circle cx="95" cy="155" r="15" fill="#ff6b00" fill-opacity="0.2" />
    <circle cx="95" cy="155" r="6" fill="#ff6b00" />
    <rect x="120" y="150" width="50" height="8" rx="2" fill="#334155" />
    <!-- Dashboard Widget representing lists -->
    <rect x="80" y="190" width="90" height="35" rx="4" fill="#0f172a" />
    <rect x="90" y="200" width="70" height="5" rx="1.5" fill="#334155" />
    <rect x="90" y="212" width="50" height="5" rx="1.5" fill="#334155" />

    <!-- Tablet Frame wireframe -->
    <rect x="230" y="60" width="230" height="320" rx="12" fill="url(#widgetGrad)" stroke="#1e293b" stroke-width="1" />
    <!-- Content card block inside Tablet wireframe -->
    <rect x="255" y="90" width="180" height="80" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
    <rect x="270" y="110" width="70" height="10" rx="2" fill="#3b82f6" />
    <rect x="270" y="130" width="110" height="6" rx="1.5" fill="#475569" />
    <rect x="270" y="142" width="90" height="6" rx="1.5" fill="#475569" />
    <!-- Small graph in Tablet -->
    <path d="M 370 150 L 390 120 L 410 135 L 430 105" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" />

    <rect x="255" y="190" width="80" height="80" rx="6" fill="#0f172a" />
    <circle cx="295" cy="230" r="18" fill="none" stroke="#ff6b00" stroke-width="4" />

    <rect x="355" y="190" width="80" height="80" rx="6" fill="#0f172a" />
    <rect x="370" y="205" width="50" height="8" rx="2" fill="#475569" />
    <rect x="370" y="225" width="40" height="8" rx="2" fill="#475569" opacity="0.6" />
    <rect x="370" y="245" width="45" height="8" rx="2" fill="#475569" opacity="0.3" />
  </g>
</svg>
