<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Glow/Neon Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffaa40" />
      <stop offset="100%" stop-color="#ff6b00" />
    </linearGradient>

    <!-- Coding/Tech Ring -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b00" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.2" />
    </linearGradient>

    <!-- Headset Gradient -->
    <linearGradient id="headsetGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#ff6b00" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="230" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="4" />

  <!-- Neon Accent Rings -->
  <circle cx="250" cy="250" r="210" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="10 15" />
  <circle cx="250" cy="250" r="190" fill="none" stroke="#ff6b00" stroke-opacity="0.1" stroke-width="1" />

  <!-- Code Symbol Floating -->
  <g transform="translate(70, 150) scale(0.8)" opacity="0.6">
    <path d="M 0 20 L 20 0 L 0 -20" fill="none" stroke="#ff6b00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M -10 20 L -30 0 L -10 -20" fill="none" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <g transform="translate(410, 310) scale(0.8)" opacity="0.6">
    <text x="0" y="0" fill="#ff6b00" font-family="monospace" font-size="24" font-weight="bold">&lt;/&gt;</text>
  </g>

  <!-- Developer Profile Illustration -->
  <g filter="url(#shadow)">
    <!-- Shoulders / Torso -->
    <path d="M 120 420 C 120 350, 160 320, 250 320 C 340 320, 380 350, 380 420 C 380 430, 370 440, 360 440 L 140 440 C 130 440, 120 430, 120 420 Z" fill="#1e293b" stroke="#334155" stroke-width="3" />
    
    <!-- Neck -->
    <rect x="230" y="270" width="40" height="60" rx="10" fill="#e2e8f0" />
    <path d="M 230 300 Q 250 310 270 300" fill="none" stroke="#cbd5e1" stroke-width="2" />

    <!-- Head / Face -->
    <rect x="190" y="160" width="120" height="130" rx="40" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" />
    
    <!-- Hair -->
    <path d="M 185 180 C 185 130, 220 120, 250 120 C 280 120, 315 130, 315 180 C 305 170, 300 170, 290 175 C 280 160, 260 160, 250 165 C 240 160, 220 160, 210 175 C 200 170, 195 170, 185 180 Z" fill="#0f172a" />

    <!-- Glasses (Cool Orange Accents) -->
    <rect x="200" y="200" width="45" height="30" rx="8" fill="none" stroke="#ff6b00" stroke-width="4" />
    <rect x="255" y="200" width="45" height="30" rx="8" fill="none" stroke="#ff6b00" stroke-width="4" />
    <line x1="245" y1="212" x2="255" y2="212" stroke="#ff6b00" stroke-width="4" />
    <!-- Glasses Side frame -->
    <path d="M 200 212 C 195 210, 190 205, 190 200" fill="none" stroke="#ff6b00" stroke-width="3" />
    <path d="M 300 212 C 305 210, 310 205, 310 200" fill="none" stroke="#ff6b00" stroke-width="3" />

    <!-- Smile -->
    <path d="M 235 255 Q 250 265 265 255" fill="none" stroke="#475569" stroke-width="3" stroke-linecap="round" />

    <!-- Headphones -->
    <path d="M 180 220 C 180 160, 200 135, 250 135 C 300 135, 320 160, 320 220" fill="none" stroke="url(#headsetGrad)" stroke-width="8" stroke-linecap="round" />
    <!-- Ear cups -->
    <rect x="175" y="200" width="16" height="45" rx="8" fill="url(#glowGrad)" />
    <rect x="309" y="200" width="16" height="45" rx="8" fill="url(#glowGrad)" />
  </g>
</svg>
